# PaDiM Default Configuration

experiment:
  name: "metal_plate_padim"
  seed: 42
  device: "cpu"

# Dataset configuration
data:
  train_dir: "data/anomaly_dataset/metal_plate/train/good"
  test_dir_bad: "data/anomaly_dataset/metal_plate/test/scratches"
  test_dir_bad_masks: "data/anomaly_dataset/metal_plate/ground_truth/scratches"
  test_dir_good: "data/anomaly_dataset/metal_plate/test/good"
  class_name: "metal_plate"

  # Image preprocessing
  transforms:
    resize: 224
    center_crop: 224
    normalize:
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]

  # DataLoader settings
  batch_size: 8
  num_workers: 0
  shuffle: false

# Feature encoder configuration
encoder:
  type: "resnet"
  backbone: "resnet18"
  layers: ["layer1", "layer2", "layer3"]
  pretrained: true

# Anomaly detection algorithm
algorithm:
  type: "padim"
  random_seed: 42

  # PaDiM-specific settings
  padim:
    dimension_reduction: 100
    total_dimensions: 448  # 64 + 128 + 256 for ResNet18
    gaussian_smoothing_sigma: 2.0
    covariance_regularization: 0.01

# Feature caching
cache:
  enabled: true
  cache_dir: "outputs/cache"
  train_features_file: "train_features.pkl"
  use_cached_if_exists: true

# Evaluation
evaluation:
  metrics: ["roc_auc", "pixel_roc_auc", "f1"]
  threshold_method: "f1"

# Visualization
visualization:
  enabled: true
  save_roc_curves: true
  save_heatmaps: true
  max_samples: null  # null = all samples
  morphology_kernel_size: 4

# Output paths
output:
  save_dir: "outputs/padim_resnet18"
  model_dir: "outputs/padim_resnet18/models"
  plots_dir: "outputs/padim_resnet18/visualizations"
  results_file: "outputs/padim_resnet18/results.json"
