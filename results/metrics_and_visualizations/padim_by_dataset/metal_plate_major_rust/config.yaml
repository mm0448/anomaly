experiment:
  name: metal_plate_major_rust_padim
  seed: 42
  device: cpu
data:
  train_dir: /Users/mma0448/str/exvi/code/ad/data/anomaly_dataset/metal_plate/train/good
  test_dir_bad: /Users/mma0448/str/exvi/code/ad/data/anomaly_dataset/metal_plate/test/major_rust
  test_dir_bad_masks: /Users/mma0448/str/exvi/code/ad/data/anomaly_dataset/metal_plate/ground_truth/major_rust
  test_dir_good: /Users/mma0448/str/exvi/code/ad/data/anomaly_dataset/metal_plate/test/good
  class_name: metal_plate_major_rust
  transforms:
    resize: 224
    center_crop: 224
    normalize:
      mean:
      - 0.485
      - 0.456
      - 0.406
      std:
      - 0.229
      - 0.224
      - 0.225
  batch_size: 8
  num_workers: 0
  shuffle: false
encoder:
  type: resnet
  backbone: resnet18
  layers:
  - layer1
  - layer2
  - layer3
  pretrained: true
algorithm:
  type: padim
  random_seed: 42
  padim:
    dimension_reduction: 100
    total_dimensions: 448
    gaussian_smoothing_sigma: 2
    covariance_regularization: 0.01
cache:
  enabled: true
  cache_dir: outputs/cache/metal_plate
  train_features_file: train_features.pkl
  use_cached_if_exists: true
evaluation:
  metrics:
  - roc_auc
  - pixel_roc_auc
  - f1
  threshold_method: f1
visualization:
  enabled: true
  save_roc_curves: true
  save_heatmaps: true
  max_samples: null
  morphology_kernel_size: 4
output:
  save_dir: outputs/metal_plate_major_rust
  model_dir: outputs/metal_plate_major_rust/models
  plots_dir: outputs/metal_plate_major_rust/visualizations
  results_file: outputs/metal_plate_major_rust/results.json
